<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NyayaSahayak - Legal Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0f0f1a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #1a1a2e;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2a2a4a;
        }

        .header-icon {
            font-size: 28px;
        }

        .header-text h1 {
            font-size: 20px;
            color: #7c6af7;
        }

        .header-text p {
            font-size: 12px;
            color: #888;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 14px;
        }

        .message.user {
            background: #7c6af7;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            background: #1a1a2e;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #2a2a4a;
        }

        .message.loading {
            background: #1a1a2e;
            color: #888;
            align-self: flex-start;
            border: 1px solid #2a2a4a;
        }

        .input-area {
            padding: 16px 24px;
            background: #1a1a2e;
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
        }

        .input-area input:focus {
            border-color: #7c6af7;
        }

        .input-area input::placeholder {
            color: #555;
        }

        .send-btn {
            background: #7c6af7;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #6a58e0;
        }

        .welcome {
            text-align: center;
            padding: 40px 20px;
            color: #555;
        }

        .welcome h2 {
            font-size: 24px;
            color: #7c6af7;
            margin-bottom: 8px;
        }

        .welcome p {
            font-size: 14px;
            margin-bottom: 24px;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .suggestion {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            color: #aaa;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion:hover {
            border-color: #7c6af7;
            color: #7c6af7;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-icon">⚖️</div>
        <div class="header-text">
            <h1>NyayaSahayak</h1>
            <p>Your free AI-powered legal assistant for India</p>
        </div>
    </div>

    <div class="chat-container" id="chat">
        <div class="welcome" id="welcome">
            <h2>⚖️ NyayaSahayak</h2>
            <p>Ask me anything about Indian laws and your legal rights</p>
            <div class="suggestions">
                <div class="suggestion" onclick="askSuggestion(this)">My landlord won't return deposit</div>
                <div class="suggestion" onclick="askSuggestion(this)">Employer not paying salary</div>
                <div class="suggestion" onclick="askSuggestion(this)">How to file an FIR?</div>
                <div class="suggestion" onclick="askSuggestion(this)">Consumer complaint process</div>
                <div class="suggestion" onclick="askSuggestion(this)">Domestic violence rights</div>
                <div class="suggestion" onclick="askSuggestion(this)">Cybercrime complaint</div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask your legal question..." onkeypress="handleKey(event)"/>
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000/chat";
        let history = [];

        function handleKey(e) {
            if (e.key === "Enter") sendMessage();
        }

        function askSuggestion(el) {
            document.getElementById("userInput").value = el.innerText;
            sendMessage();
        }

        function addMessage(text, type) {
            const welcome = document.getElementById("welcome");
            if (welcome) welcome.remove();

            const chat = document.getElementById("chat");
            const div = document.createElement("div");
            div.className = `message ${type}`;
            div.innerText = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const message = input.value.trim();
            if (!message) return;

            input.value = "";
            addMessage(message, "user");

            const loading = addMessage("NyayaSahayak is thinking...", "loading");

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message, history })
                });

                const data = await response.json();
                loading.remove();

                addMessage(data.reply, "bot");
                history.push({ role: "user", content: message });
                history.push({ role: "assistant", content: data.reply });

            } catch (err) {
                loading.remove();
                addMessage("Something went wrong. Please try again.", "bot");
            }
        }
    </script>

</body>
</html>
